
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chat Phone UI</title>
    <style>
        /* ================= 基础样式 ================= */
        :root {
            --bg-color: #000; 
            --text-color: #ffffff;
            --accent-color: #007aff; 
            --heart-color: #ff4757;
            --ios-gray-bg: #f2f2f6;
            --bubble-me: #95ec69; 
            --bubble-ai: #ffffff;
            --ease-ios: cubic-bezier(0.32, 0.72, 0, 1);
            /* 世界书黑白拟态配色 */
            --neo-bg: #e0e5ec;
            --neo-text: #333333;
            --neo-shadow-light: #ffffff;
            --neo-shadow-dark: #a3b1c6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            padding: 0;
            width: 100vw; 
            height: 100vh; 
            background-color: var(--bg-color); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; 
        }

        .screen { 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(135deg, #2b1055, #7597de); 
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            position: relative; 
            overflow: hidden; 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
        }

        /* --- 桌面组件 --- */
        .header-widget { text-align: center; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); margin-top: 20px; }
        .date-line { font-size: 14px; opacity: 0.9; margin-bottom: 5px; }
        .time-line { font-size: 54px; font-weight: 300; line-height: 1; }

        .grid-container { display: grid; grid-template-columns: 1.2fr 0.8fr; grid-template-rows: 1.2fr 1fr 50px; gap: 15px; flex-grow: 1; margin-bottom: 20px;}
        .widget { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border-radius: 22px; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 16px rgba(0,0,0,0.1); position: relative; overflow: hidden; }

        .photo-widget { grid-column: 1/2; grid-row: 1/3; display: flex; flex-direction: column; justify-content: space-between; background-size: cover; background-position: center; cursor: pointer; }
        .heart-icon { width: 24px; height: 24px; margin: 15px; fill: none; stroke: var(--heart-color); stroke-width: 2; }
        .battery-container { margin: 15px; background: rgba(0,0,0,0.4); height: 6px; border-radius: 3px; overflow: hidden; }
        .battery-level { height: 100%; width: 80%; background-color: #4cd137; }

        .apps-area { grid-column: 2/3; grid-row: 1/2; display: flex; flex-direction: column; justify-content: space-around; align-items: center; }
        .app-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 13px; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.15s; }
        .app-icon:active { transform: scale(0.9); }
        .icon-qq { background: linear-gradient(135deg, #12B7F5, #0088D1); color: white; }
        .icon-world { background: linear-gradient(135deg, #333, #666); color: white; } /* 世界书图标改为冷峻色 */

        .time-bars-area { grid-column: 2/3; grid-row: 2/4; display: flex; justify-content: space-around; padding: 12px 0; align-items: flex-end; }
        .vertical-bar-group { display: flex; flex-direction: column; align-items: center; height: 100%; width: 35%; }
        .bar-track { width: 100%; flex-grow: 1; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; overflow: hidden; display: flex; align-items: flex-end; }
        .bar-fill { width: 100%; height: 50%; background: #fff; border-radius: 10px; }
        .bar-label { font-size: 10px; margin-top: 6px; opacity: 0.9; text-align: center; }

        .settings-area { grid-column: 1/2; grid-row: 3/4; display: flex; gap: 10px; }
        .setting-btn { flex: 1; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; border-radius: 14px; cursor: pointer; font-size: 13px; font-weight: 600; backdrop-filter: blur(10px); }

        /* ================= 通用 APP 页面 ================= */
        .app-page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.4s var(--ease-ios); background: #fff; color:#000; }
        .app-page.active { transform: translateX(0); }
        .nav-header { display: flex; justify-content: space-between; align-items: center; padding: 40px 15px 10px 15px; font-size: 17px; font-weight: 600; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 0.5px solid #ddd; color: #000; z-index: 10; }
        .nav-btn { background: transparent; border: none; font-size: 16px; color: var(--accent-color); cursor: pointer; }
        .nav-title { flex: 1; text-align: center; }

        /* ================= 设置页面复用类 ================= */
        .page-bg-gray { background-color: var(--ios-gray-bg); }
        .scroll-content { flex: 1; overflow-y: auto; padding: 15px; color: #333; }
        .setting-card { background: #fff; border-radius: 10px; padding: 0 15px; margin-bottom: 20px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 0.5px solid #eee; }
        .setting-row:last-child { border-bottom: none; }
        .setting-row label { font-size: 15px; min-width: 80px; }
        .input-clean { flex: 1; border: none; font-size: 14px; text-align: right; outline: none; background: transparent; color: #555; }
        .btn-small { padding: 5px 10px; background: #e5e5ea; border-radius: 8px; font-size: 12px; color: #333; border: none; cursor: pointer; margin-left: 5px; }

        /* === 模型选择器弹窗 === */
        .model-picker-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; display: none; flex-direction: column; justify-content: flex-end; }
        .model-picker-modal.active { display: flex; }
        .picker-content { background: #fff; border-radius: 20px 20px 0 0; max-height: 80%; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .picker-header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; font-weight: bold; color: #333; display: flex; justify-content: space-between; }
        .picker-list { flex: 1; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
        .picker-item { padding: 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; color: #333; font-size: 14px; }
        .picker-item:hover { background: #f9f9f9; }

        /* ================= QQ 页面 ================= */
        .chat-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
        .chat-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin-right: 15px; background: #eee; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-size: 16px; font-weight: 500; color: #333; margin-bottom: 4px; }
        .chat-preview { font-size: 12px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-mini-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; cursor: pointer; margin-right: 10px; }

        /* ================= 聊天详情页 ================= */
        #page-chat { background: #ededed; }
        .message-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* 修改: 确保内容横向排列，不变成竖排 */
        .message-row { display: flex; align-items: flex-start; gap: 10px; width: 100%; min-width: 0; }
        .message-row.me { flex-direction: row-reverse; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: #ddd; flex-shrink: 0; }
        .bubble { max-width: 70%; padding: 10px 14px; border-radius: 8px; font-size: 15px; line-height: 1.5; word-wrap: break-word; word-break: break-word; white-space: pre-wrap; text-align: left; display: inline-block; }
        .bubble.ai { background: var(--bubble-ai); color: #000; }
        .bubble.me { background: var(--bubble-me); color: #000; }
        .bubble.system { font-size: 12px; color: #999; text-align: center; width: 100%; max-width: 100%; background: transparent; padding: 0; margin: -5px 0 5px; }

        .input-bar { background: #f7f7f7; padding: 10px 15px; display: flex; align-items: center; gap: 8px; border-top: 0.5px solid #dcdcdc; }
        .chat-input { flex: 1; border: none; padding: 10px; border-radius: 6px; background: #fff; font-size: 16px; outline: none; min-width: 0; }
        
        /* 修改: 按钮变成图标样式 */
        .icon-btn-chat { width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; border: none; color: #fff; cursor: pointer; flex-shrink: 0; transition: transform 0.1s; }
        .icon-btn-chat:active { transform: scale(0.9); }
        .btn-send { background: var(--accent-color); }
        .btn-gen { background: #ff9f43; }
        .icon-btn-chat:disabled { background: #ccc; cursor: not-allowed; }

        /* ================= 抽屉 (用户/AI设定) ================= */
        .drawer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 300; opacity: 0; pointer-events: none; transition: 0.3s; display: flex; align-items: flex-end; }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }
        .drawer { width: 100%; background: #fff; border-radius: 20px 20px 0 0; padding: 20px; transform: translateY(100%); transition: 0.3s; display: flex; flex-direction: column; align-items: center; max-height: 85%; overflow-y: auto; }
        .drawer-overlay.active .drawer { transform: translateY(0); }
        
        .avatar-uploader { width: 80px; height: 80px; border-radius: 50%; background: #f0f0f0; border: 2px dashed #ccc; display: flex; justify-content: center; align-items: center; font-size: 30px; color: #ccc; cursor: pointer; overflow: hidden; margin-bottom: 20px; }
        .avatar-uploader img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .drawer-input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; text-align: center; outline: none; font-size: 15px; }
        .drawer-textarea { height: 80px; resize: none; text-align: left; }
        .drawer-row { display: flex; align-items: center; width: 100%; margin-bottom: 15px; gap: 10px; }
        .drawer-row label { font-size: 15px; }
        .drawer-row select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }

        .toast { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 999; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(10px); }

        /* ================= 新增: 世界书 黑白拟态 (Neomorphism) UI ================= */
        .neo-page { background-color: var(--neo-bg) !important; color: var(--neo-text) !important; }
        .neo-header { background: transparent !important; border: none !important; box-shadow: 0 4px 10px rgba(163,177,198,0.2) !important; color: var(--neo-text) !important; }
        .neo-btn-small { border: none; background: var(--neo-bg); box-shadow: 4px 4px 8px var(--neo-shadow-dark), -4px -4px 8px var(--neo-shadow-light); border-radius: 10px; color: var(--neo-text); padding: 8px 15px; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: bold; }
        .neo-btn-small:active { box-shadow: inset 4px 4px 8px var(--neo-shadow-dark), inset -4px -4px 8px var(--neo-shadow-light); }
        .neo-card { background: var(--neo-bg); border-radius: 15px; padding: 15px; box-shadow: 6px 6px 12px var(--neo-shadow-dark), -6px -6px 12px var(--neo-shadow-light); cursor: pointer; transition: 0.2s; }
        .neo-card:active { transform: scale(0.98); }
        .neo-input { width: 100%; border: none; background: var(--neo-bg); box-shadow: inset 4px 4px 8px var(--neo-shadow-dark), inset -4px -4px 8px var(--neo-shadow-light); padding: 12px 15px; border-radius: 12px; outline: none; margin-bottom: 15px; color: var(--neo-text); font-size: 14px; }
        .neo-select { width: 100%; border: none; background: var(--neo-bg); box-shadow: inset 4px 4px 8px var(--neo-shadow-dark), inset -4px -4px 8px var(--neo-shadow-light); padding: 12px 15px; border-radius: 12px; outline: none; margin-bottom: 15px; color: var(--neo-text); font-size: 14px; appearance: none; }
        
        .wb-categories { display: flex; gap: 12px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .wb-categories::-webkit-scrollbar { display: none; }
        .wb-cat-tab { padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; background: var(--neo-bg); box-shadow: 4px 4px 8px var(--neo-shadow-dark), -4px -4px 8px var(--neo-shadow-light); white-space: nowrap; cursor: pointer; color: #666; transition: 0.2s; }
        .wb-cat-tab.active { box-shadow: inset 4px 4px 8px var(--neo-shadow-dark), inset -4px -4px 8px var(--neo-shadow-light); color: #000; }
        
        .neo-drawer { background: var(--neo-bg) !important; box-shadow: 0 -10px 30px rgba(163,177,198,0.4) !important; border-radius: 25px 25px 0 0 !important; }

    </style>
</head>
<body>

    <div class="screen" id="main-screen">
        <!-- 桌面内容 -->
        <div class="header-widget">
            <div class="date-line" id="date-display">...</div>
            <div class="time-line" id="time-display">...</div>
        </div>

        <div class="grid-container">
            <div class="widget photo-widget" id="photo-widget" onclick="document.getElementById('bg-upload').click()">
                <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <div class="battery-container"><div class="battery-level" id="battery-bar"></div></div>
                <input type="file" id="bg-upload" accept="image/*" style="display:none">
            </div>

            <div class="apps-area">
                <div class="app-icon icon-qq" onclick="openPage('qq-page')">QQ</div>
                <div class="app-icon icon-world" onclick="openWorldbookPage()">世界书</div>
            </div>

            <div class="settings-area">
                <button class="setting-btn" onclick="openPage('beautify-page')">外观</button>
                <button class="setting-btn" onclick="openPage('api-page')">API</button>
            </div>

            <div class="widget time-bars-area">
                <div class="vertical-bar-group">
                    <div class="bar-track"><div class="bar-fill" id="year-fill"></div></div>
                    <div class="bar-label">年剩 <span id="year-text">0%</span></div>
                </div>
                <div class="vertical-bar-group">
                    <div class="bar-track"><div class="bar-fill" id="day-fill"></div></div>
                    <div class="bar-label">日剩 <span id="day-text">0%</span></div>
                </div>
            </div>
        </div>

        <!-- ================= 外观美化设置页面 ================= -->
        <div class="app-page page-bg-gray" id="beautify-page">
            <div class="nav-header">
                <button class="nav-btn" onclick="closePage('beautify-page')">❮ 返回</button>
                <span>外观设置</span>
                <span style="width: 50px;"></span>
            </div>
            <div class="scroll-content">
                <div class="setting-card">
                    <h4 style="margin: 10px 0 0 0; padding: 10px 0; border-bottom: 0.5px solid #eee;">修改主屏幕壁纸</h4>
                    <div class="setting-row">
                        <label>网络链接</label>
                        <input type="text" id="wp-url" class="input-clean" placeholder="http://...">
                    </div>
                    <div class="setting-row">
                        <label>本地图片</label>
                        <input type="file" id="wp-file" accept="image/*" style="font-size: 12px; width: 160px; outline: none; border: none;">
                    </div>
                    <button class="btn-small" style="width:100%; padding:10px; margin-top:10px; background:var(--accent-color); color:#fff;" onclick="saveWallpaper()">保存并应用壁纸</button>
                    <button class="btn-small" style="width:100%; padding:10px; margin-top:10px;" onclick="resetWallpaper()">恢复默认壁纸</button>
                </div>

                <div class="setting-card">
                    <h4 style="margin: 10px 0 0 0; padding: 10px 0; border-bottom: 0.5px solid #eee;">修改全局字体</h4>
                    <div class="setting-row">
                        <label>字体链接</label>
                        <input type="text" id="font-url" class="input-clean" placeholder="http://.../font.ttf">
                    </div>
                    <button class="btn-small" style="width:100%; padding:10px; margin-top:10px; background:var(--accent-color); color:#fff;" onclick="saveFont()">保存并应用字体</button>
                    <button class="btn-small" style="width:100%; padding:10px; margin-top:10px;" onclick="resetFont()">恢复默认字体</button>
                </div>
            </div>
        </div>

        <!-- ================= API 设置页面 ================= -->
        <div class="app-page page-bg-gray" id="api-page">
            <div class="nav-header">
                <button class="nav-btn" onclick="closePage('api-page')">❮ 返回</button>
                <span>API 配置</span>
                <button class="nav-btn" onclick="saveApiConfig()">保存</button>
            </div>
            <div class="scroll-content">
                <p style="font-size:12px; color:#666; background:#eee; padding:10px; border-radius:8px;">
                    提示：使用公益站点 Key (非 sk- 开头) 时，请确保“反代地址”正确。拉取成功后会弹出列表选择。
                </p>
                <div class="setting-card">
                    <div class="setting-row">
                        <label>反代地址</label>
                        <input type="text" id="api-url" class="input-clean" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="setting-row">
                        <label>API Key</label>
                        <input type="password" id="api-key" class="input-clean" placeholder="sk-...">
                    </div>
                    <div class="setting-row">
                        <label>模型</label>
                        <input type="text" id="api-model" class="input-clean" placeholder="gpt-3.5-turbo">
                        <button class="btn-small" onclick="fetchModels()">拉取列表</button>
                    </div>
                </div>
                <button class="btn-small" style="width:100%; padding:10px;" onclick="testConnection()">🛠️ 测试连接 (调试)</button>
            </div>
        </div>

        <div class="model-picker-modal" id="model-picker">
            <div class="picker-content">
                <div class="picker-header">
                    <span onclick="closeModelPicker()" style="color:#999; font-weight:normal; cursor:pointer;">取消</span>
                    <span>选择模型</span>
                    <span style="width:30px;"></span>
                </div>
                <ul class="picker-list" id="model-list-ul"></ul>
            </div>
        </div>

        <!-- ================= QQ 页面 ================= -->
        <div class="app-page" id="qq-page">
            <div class="nav-header">
                <button class="nav-btn" onclick="closePage('qq-page')">❮</button>
                <div class="nav-title">消息</div>
                <div style="display:flex; align-items:center;">
                    <img id="my-avatar-btn" class="user-mini-avatar" src="" onclick="openUserDrawer()">
                    <button class="nav-btn" style="font-size:24px; font-weight:300;" onclick="openAiDrawer()">+</button>
                </div>
            </div>
            <ul class="chat-list" id="chat-list"></ul>
        </div>

        <!-- ================= 聊天对话页面 ================= -->
        <div class="app-page" id="chat-page">
            <div class="nav-header">
                <button class="nav-btn" onclick="closePage('chat-page')">❮</button>
                <div class="nav-title" id="chat-title">聊天中</div>
                <button class="nav-btn" style="font-size:20px;" onclick="openAiDrawer(true)">⚙️</button>
            </div>
            <div class="message-area" id="msg-area"></div>
            <div class="input-bar">
                <input type="text" class="chat-input" id="chat-input" placeholder="输入消息...">
                <!-- 修改：拆分发送按钮与生成按钮 -->
                <button class="icon-btn-chat btn-send" id="send-btn" onclick="sendOnly()" title="仅发送消息不回复">✈️</button>
                <button class="icon-btn-chat btn-gen" id="generate-btn" onclick="generateReply()" title="呼叫AI回复">🌀</button>
            </div>
        </div>

        <!-- ================= 新增：世界书 拟态页面 ================= -->
        <div class="app-page neo-page" id="worldbook-page">
            <div class="nav-header neo-header">
                <button class="nav-btn" style="color:var(--neo-text);" onclick="closePage('worldbook-page')">❮ 返回</button>
                <div class="nav-title" style="font-weight: 800;">世界书</div>
                <button class="neo-btn-small" style="font-size:18px;" onclick="openWbDrawer()">+</button>
            </div>
            <div class="wb-categories" id="wb-category-list">
                <!-- 动态生成分类 Tab -->
            </div>
            <div class="scroll-content" id="wb-list" style="padding: 0 15px 20px 15px; display:flex; flex-direction:column; gap:20px;">
                <!-- 动态生成世界书条目 -->
            </div>
        </div>

        <!-- AI 角色设定抽屉 -->
        <div class="drawer-overlay" id="drawer-ai">
            <div class="drawer">
                <h3 style="margin-top:0" id="drawer-ai-title">设定 AI 角色</h3>
                <div class="avatar-uploader" onclick="document.getElementById('ai-avatar-file').click()">
                    <span id="ai-plus">+</span>
                    <img id="ai-avatar-preview" src="">
                </div>
                <input type="file" id="ai-avatar-file" accept="image/*" style="display:none">
                
                <input type="text" id="ai-name" class="drawer-input" placeholder="角色名字 (如: 派蒙)">
                <textarea id="ai-prompt" class="drawer-input drawer-textarea" placeholder="性格设定 (如: 你是一个傲娇的向导...)"></textarea>
                
                <div class="drawer-row">
                    <label for="ai-user-binding">与我聊天时，我是:</label>
                    <select id="ai-user-binding" class="drawer-input" style="text-align: left; padding: 12px;"></select>
                </div>

                <div style="display:flex; width:100%; gap:10px;">
                    <button onclick="closeDrawer('drawer-ai')" style="flex:1; padding:12px; border-radius:10px; border:none; background:#eee;">取消</button>
                    <button onclick="saveAiCharacter()" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--accent-color); color:#fff;">保存</button>
                </div>
            </div>
        </div>

        <!-- 用户角色设定抽屉 -->
        <div class="drawer-overlay" id="drawer-user">
            <div class="drawer">
                <h3 style="margin-top:0">我的资料</h3>

                <div class="drawer-row">
                    <select id="user-profile-select" style="flex:1; padding: 8px; border-radius: 8px; border: 1px solid #ddd;"></select>
                    <button onclick="createNewUser()" class="btn-small">创建新角色</button>
                </div>

                <div class="avatar-uploader" onclick="document.getElementById('user-avatar-file').click()">
                    <span id="user-plus">+</span>
                    <img id="user-avatar-preview" src="">
                </div>
                <input type="file" id="user-avatar-file" accept="image/*" style="display:none">
                
                <input type="text" id="user-name" class="drawer-input" placeholder="我的名字 (AI怎么称呼你)">
                <textarea id="user-prompt" class="drawer-input drawer-textarea" placeholder="我的设定 (可选，告诉AI你是谁，如：我是你的主人)"></textarea>

                <div style="display:flex; width:100%; gap:10px;">
                    <button onclick="closeDrawer('drawer-user')" style="flex:1; padding:12px; border-radius:10px; border:none; background:#eee;">取消</button>
                    <button onclick="saveUser()" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--accent-color); color:#fff;">保存</button>
                </div>
            </div>
        </div>

        <!-- 世界书条目编辑抽屉 (拟态UI) -->
        <div class="drawer-overlay" id="drawer-wb">
            <div class="drawer neo-drawer">
                <h3 style="margin-top:0; margin-bottom: 20px;" id="drawer-wb-title">世界书条目</h3>
                
                <input type="text" id="wb-keyword" class="neo-input" placeholder="触发关键词 (如: 魔法, 皇宫)">
                <input type="text" id="wb-category" class="neo-input" placeholder="所属分类 (如: 设定, 地点)">
                
                <select id="wb-ai-bind" class="neo-select">
                    <option value="all">绑定到所有 AI 角色</option>
                    <!-- 动态注入角色 -->
                </select>
                
                <textarea id="wb-content" class="neo-input" style="height: 120px; resize: none;" placeholder="在此输入与该关键词相关的具体设定提示词内容..."></textarea>
                
                <div style="display:flex; width:100%; gap:15px; margin-top:5px;">
                    <button class="neo-btn-small" style="flex:1; color:#999;" onclick="closeDrawer('drawer-wb')">取消</button>
                    <button class="neo-btn-small" style="flex:1; color:#000; font-weight:800;" onclick="saveWb()">确认保存</button>
                </div>
                <button id="wb-delete-btn" class="neo-btn-small" style="width:100%; margin-top:15px; color:var(--heart-color); display:none;" onclick="deleteWb()">删除此条目</button>
            </div>
        </div>


        <!-- Toast 提示 -->
        <div class="toast" id="toast">提示信息</div>
    </div>

    <script>
        // --- 基础工具 ---
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        function openPage(id) { 
            document.getElementById(id).classList.add('active'); 
            if(id === 'qq-page') loadChatList();
        }
        function closePage(id) { document.getElementById(id).classList.remove('active'); }
        function openDrawer(id) { document.getElementById(id).classList.add('active'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('active'); }

        // --- 桌面时钟/电量/小组件 ---
        setInterval(() => {
            const now = new Date();
            const days = ['周日','周一','周二','周三','周四','周五','周六'];
            document.getElementById('date-display').innerText = `${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}`;
            document.getElementById('time-display').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            
            const startOfYear = new Date(now.getFullYear(), 0, 1).getTime();
            const endOfYear = new Date(now.getFullYear(), 11, 31, 23, 59, 59).getTime();
            const yearTotal = endOfYear - startOfYear;
            const yearElapsed = now.getTime() - startOfYear;
            const yearPct = (yearElapsed / yearTotal) * 100;
            document.getElementById('year-fill').style.height = `${yearPct}%`;
            document.getElementById('year-text').innerText = `${yearPct.toFixed(1)}%`;

            const startDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const dayPct = ((now.getTime() - startDay) / 86400000) * 100;
            document.getElementById('day-fill').style.height = `${dayPct}%`;
            document.getElementById('day-text').innerText = `${(100 - dayPct).toFixed(1)}%`;
        }, 1000);
        
        navigator.getBattery?.().then(b => {
            const update = () => document.getElementById('battery-bar').style.width = (b.level * 100) + '%';
            update(); b.addEventListener('levelchange', update);
        });

        document.getElementById('bg-upload').onchange = e => {
            if(e.target.files[0]) {
                const r = new FileReader();
                r.onload = ev => document.getElementById('photo-widget').style.backgroundImage = `url(${ev.target.result})`;
                r.readAsDataURL(e.target.files[0]);
            }
        };

        // ================= 外观美化逻辑 =================
        let beautifyConfig = JSON.parse(localStorage.getItem('ai_beautify_config') || '{}');
        let tempWpData = '';

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('wp-url').value = beautifyConfig.wpUrl || '';
            document.getElementById('font-url').value = beautifyConfig.fontUrl || '';
            
            if (beautifyConfig.wpData) {
                document.getElementById('main-screen').style.backgroundImage = `url(${beautifyConfig.wpData})`;
            } else if (beautifyConfig.wpUrl) {
                document.getElementById('main-screen').style.backgroundImage = `url(${beautifyConfig.wpUrl})`;
            }
            if (beautifyConfig.fontUrl) applyFont(beautifyConfig.fontUrl);
        });

        document.getElementById('wp-file').onchange = e => {
            if(e.target.files[0]){
                const r = new FileReader();
                r.onload = ev => { tempWpData = ev.target.result; showToast('已选中本地图片，请点击保存'); };
                r.readAsDataURL(e.target.files[0]);
            }
        };

        function saveWallpaper() {
            const wpUrl = document.getElementById('wp-url').value.trim();
            try {
                if (tempWpData) {
                    beautifyConfig.wpData = tempWpData;
                    beautifyConfig.wpUrl = '';
                    document.getElementById('wp-url').value = '';
                    document.getElementById('main-screen').style.backgroundImage = `url(${tempWpData})`;
                    localStorage.setItem('ai_beautify_config', JSON.stringify(beautifyConfig));
                    showToast('本地壁纸保存成功！');
                    tempWpData = ''; document.getElementById('wp-file').value = ''; 
                } else if (wpUrl) {
                    showToast('正在加载网络壁纸...');
                    const img = new Image();
                    img.onload = () => {
                        beautifyConfig.wpUrl = wpUrl;
                        beautifyConfig.wpData = '';
                        document.getElementById('main-screen').style.backgroundImage = `url(${wpUrl})`;
                        localStorage.setItem('ai_beautify_config', JSON.stringify(beautifyConfig));
                        showToast('网络壁纸应用并保存成功！');
                    };
                    img.onerror = () => showToast('加载失败，请检查链接是否有效！');
                    img.src = wpUrl;
                } else {
                    showToast('请先填写图片链接或选择本地图片');
                }
            } catch (e) { showToast('保存失败: 可能是图片太大超出本地限制'); }
        }

        function resetWallpaper() {
            beautifyConfig.wpData = ''; beautifyConfig.wpUrl = '';
            document.getElementById('wp-url').value = ''; document.getElementById('wp-file').value = '';
            tempWpData = ''; document.getElementById('main-screen').style.backgroundImage = 'linear-gradient(135deg, #2b1055, #7597de)';
            localStorage.setItem('ai_beautify_config', JSON.stringify(beautifyConfig));
            showToast('已恢复默认壁纸');
        }

        async function saveFont() {
            const fontUrl = document.getElementById('font-url').value.trim();
            if(!fontUrl) return showToast('请先填写字体链接');
            showToast('正在加载字体...');
            try {
                const font = new FontFace('CustomUserFont', `url(${fontUrl})`);
                await font.load();
                document.fonts.add(font);
                document.body.style.fontFamily = "'CustomUserFont', -apple-system, BlinkMacSystemFont, sans-serif";
                beautifyConfig.fontUrl = fontUrl;
                localStorage.setItem('ai_beautify_config', JSON.stringify(beautifyConfig));
                showToast('字体应用并保存成功！');
            } catch(e) { showToast('加载失败：请检查链接有效性或是否允许跨域'); }
        }

        function resetFont() {
            beautifyConfig.fontUrl = ''; document.getElementById('font-url').value = '';
            document.body.style.fontFamily = "-apple-system, BlinkMacSystemFont, sans-serif";
            localStorage.setItem('ai_beautify_config', JSON.stringify(beautifyConfig));
            showToast('已恢复默认字体');
        }

        async function applyFont(url) {
            try {
                const font = new FontFace('CustomUserFont', `url(${url})`);
                await font.load(); document.fonts.add(font);
                document.body.style.fontFamily = "'CustomUserFont', -apple-system, BlinkMacSystemFont, sans-serif";
            } catch(e) {}
        }


        // ================= API 逻辑 =================
        let config = JSON.parse(localStorage.getItem('ai_phone_config') || '{}');
        document.getElementById('api-url').value = config.url || '';
        document.getElementById('api-key').value = config.key || '';
        document.getElementById('api-model').value = config.model || '';

        function saveApiConfig() {
            config = { url: document.getElementById('api-url').value.trim(), key: document.getElementById('api-key').value.trim(), model: document.getElementById('api-model').value.trim() };
            localStorage.setItem('ai_phone_config', JSON.stringify(config));
            showToast('API 配置已保存');
        }

        function getEndpoint(base) {
            base = base.replace(/\/+$/, '');
            if (base.endsWith('/v1')) return base;
            return base + '/v1'; 
        }

        async function fetchModels() {
            let baseUrl = document.getElementById('api-url').value.trim();
            const apiKey = document.getElementById('api-key').value.trim();
            if (!baseUrl || !apiKey) return showToast('请填写 API 地址和 Key');

            showToast('正在连接服务器...');
            try {
                const res = await fetch(getEndpoint(baseUrl) + '/models', { method: 'GET', headers: { 'Authorization': `Bearer ${apiKey}` } });
                if (!res.ok) return alert(`连接失败！状态码: ${res.status}`);
                const data = await res.json();
                let models = Array.isArray(data) ? data : (data.data || []);
                const ul = document.getElementById('model-list-ul');
                ul.innerHTML = '';
                models.sort((a, b) => (a.id || a).localeCompare(b.id || b)).forEach(m => {
                    const id = m.id || m; const li = document.createElement('li');
                    li.className = 'picker-item'; li.innerText = id;
                    li.onclick = () => { document.getElementById('api-model').value = id; closeModelPicker(); };
                    ul.appendChild(li);
                });
                document.getElementById('model-picker').classList.add('active');
            } catch (err) { alert(`网络错误:\n${err.message}`); }
        }

        function testConnection() {
            let baseUrl = document.getElementById('api-url').value.trim();
            alert(`测试请求: ${getEndpoint(baseUrl)}/models`); fetchModels();
        }
        function closeModelPicker() { document.getElementById('model-picker').classList.remove('active'); }

        // ================= 用户(我) 角色管理 =================
        let userProfiles = JSON.parse(localStorage.getItem('ai_users_list') || '[]');
        let tempUserAv = ''; let currentEditUserId = null;

        if (userProfiles.length === 0) {
            userProfiles.push({ id: Date.now(), name: '我', avatar: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="%23ddd"/><text x="50" y="50" text-anchor="middle" dominant-baseline="middle" font-size="40">🤠</text></svg>', prompt: '' });
            localStorage.setItem('ai_users_list', JSON.stringify(userProfiles));
        }
        document.getElementById('my-avatar-btn').src = userProfiles[0].avatar;

        function openUserDrawer() {
            const select = document.getElementById('user-profile-select');
            select.innerHTML = '';
            userProfiles.forEach(p => { select.appendChild(new Option(p.name, p.id)); });
            select.onchange = () => loadUserForm(select.value);
            loadUserForm(select.value);
            openDrawer('drawer-user');
        }

        function loadUserForm(userId) {
            const user = userProfiles.find(p => p.id == userId);
            if (!user) return;
            currentEditUserId = user.id;
            document.getElementById('user-name').value = user.name;
            document.getElementById('user-prompt').value = user.prompt || '';
            document.getElementById('user-avatar-preview').src = user.avatar;
            document.getElementById('user-avatar-preview').style.display = 'block';
            document.getElementById('user-plus').style.display = 'none';
            tempUserAv = user.avatar;
        }

        function createNewUser() {
            currentEditUserId = null; 
            document.getElementById('user-name').value = `新角色 ${userProfiles.length + 1}`;
            document.getElementById('user-prompt').value = '';
            document.getElementById('user-avatar-preview').style.display = 'none';
            document.getElementById('user-plus').style.display = 'block';
            tempUserAv = ''; document.getElementById('user-name').focus();
        }

        document.getElementById('user-avatar-file').onchange = e => {
            if(e.target.files[0]){
                const r = new FileReader();
                r.onload = ev => { tempUserAv = ev.target.result; document.getElementById('user-avatar-preview').src = tempUserAv; document.getElementById('user-avatar-preview').style.display = 'block'; document.getElementById('user-plus').style.display = 'none'; };
                r.readAsDataURL(e.target.files[0]);
            }
        };

        function saveUser() {
            const name = document.getElementById('user-name').value.trim() || '我';
            const prompt = document.getElementById('user-prompt').value.trim();
            const avatar = tempUserAv || userProfiles[0].avatar;

            if (currentEditUserId) { 
                const user = userProfiles.find(p => p.id === currentEditUserId);
                user.name = name; user.prompt = prompt; user.avatar = avatar;
            } else { 
                userProfiles.push({ id: Date.now(), name, prompt, avatar });
            }
            localStorage.setItem('ai_users_list', JSON.stringify(userProfiles));
            document.getElementById('my-avatar-btn').src = userProfiles[0].avatar; 
            closeDrawer('drawer-user'); showToast('用户资料已保存');
        }

        // ================= AI 角色管理 =================
        let aiList = JSON.parse(localStorage.getItem('ai_list_v2') || '[]');
        let currentEditId = null; let tempAiAv = '';

        function openAiDrawer(isEdit = false) {
            tempAiAv = '';
            const userBindingSelect = document.getElementById('ai-user-binding');
            userBindingSelect.innerHTML = '';
            userProfiles.forEach(p => { userBindingSelect.appendChild(new Option(p.name, p.id)); });

            if(isEdit && currentChatId) {
                const ai = aiList.find(c => c.id === currentChatId);
                currentEditId = ai.id;
                document.getElementById('drawer-ai-title').innerText = '修改角色';
                document.getElementById('ai-name').value = ai.name;
                document.getElementById('ai-prompt').value = ai.prompt || '';
                document.getElementById('ai-avatar-preview').src = ai.avatar;
                document.getElementById('ai-avatar-preview').style.display = 'block';
                document.getElementById('ai-plus').style.display = 'none';
                userBindingSelect.value = ai.userId || userProfiles[0].id;
            } else {
                currentEditId = null;
                document.getElementById('drawer-ai-title').innerText = '新建角色';
                document.getElementById('ai-name').value = ''; document.getElementById('ai-prompt').value = '';
                document.getElementById('ai-avatar-preview').style.display = 'none'; document.getElementById('ai-plus').style.display = 'block';
                userBindingSelect.value = userProfiles[0].id;
            }
            openDrawer('drawer-ai');
        }

        document.getElementById('ai-avatar-file').onchange = e => {
            if(e.target.files[0]){
                const r = new FileReader();
                r.onload = ev => { tempAiAv = ev.target.result; document.getElementById('ai-avatar-preview').src = tempAiAv; document.getElementById('ai-avatar-preview').style.display = 'block'; document.getElementById('ai-plus').style.display = 'none';};
                r.readAsDataURL(e.target.files[0]);
            }
        };

        function saveAiCharacter() {
            const name = document.getElementById('ai-name').value.trim();
            if(!name) return showToast('请输入名字');
            let av = tempAiAv || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="%23ddd"/><text x="50" y="50" text-anchor="middle" dominant-baseline="middle" font-size="30">🤖</text></svg>';
            const prompt = document.getElementById('ai-prompt').value;
            const userId = parseInt(document.getElementById('ai-user-binding').value); 

            if(currentEditId) {
                const ai = aiList.find(c => c.id === currentEditId);
                ai.name = name; ai.prompt = prompt; ai.userId = userId; 
                if(tempAiAv) ai.avatar = av;
            } else {
                aiList.unshift({ id: Date.now(), name, avatar: av, prompt, userId, history: [] });
            }
            localStorage.setItem('ai_list_v2', JSON.stringify(aiList));
            closeDrawer('drawer-ai'); loadChatList();
            if(currentEditId) document.getElementById('chat-title').innerText = name;
            showToast('已保存');
        }

        function loadChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            if(aiList.length===0) return list.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">点击右上角 + 创建角色</div>';
            
            aiList.forEach(ai => {
                const li = document.createElement('li'); li.className = 'chat-item';
                const lastMsg = ai.history.length > 0 ? ai.history.slice(-1)[0].content : '暂无消息';
                li.innerHTML = `<img class="chat-avatar" src="${ai.avatar}"><div class="chat-info"><div class="chat-name">${ai.name}</div><div class="chat-preview">${lastMsg}</div></div>`;
                li.onclick = () => openChat(ai.id);
                list.appendChild(li);
            });
        }

        // ================= 【新增】世界书核心逻辑 =================
        let worldbooks = JSON.parse(localStorage.getItem('ai_worldbooks') || '[]');
        let currentWbCat = '全部';
        let currentEditWbId = null;

        function openWorldbookPage() {
            openPage('worldbook-page');
            renderWbCategories();
            renderWbList();
        }

        function renderWbCategories() {
            const catContainer = document.getElementById('wb-category-list');
            catContainer.innerHTML = '';
            const categories = ['全部', ...new Set(worldbooks.map(w => w.category || '未分类'))];
            
            categories.forEach(cat => {
                const tab = document.createElement('div');
                tab.className = `wb-cat-tab ${cat === currentWbCat ? 'active' : ''}`;
                tab.innerText = cat;
                tab.onclick = () => { currentWbCat = cat; renderWbCategories(); renderWbList(); };
                catContainer.appendChild(tab);
            });
        }

        function renderWbList() {
            const listContainer = document.getElementById('wb-list');
            listContainer.innerHTML = '';
            
            let filtered = worldbooks;
            if (currentWbCat !== '全部') filtered = worldbooks.filter(w => (w.category || '未分类') === currentWbCat);
            
            if (filtered.length === 0) {
                listContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#999; font-size:14px;">该分类下暂无世界书条目<br><br>点击右上角 + 号创建设定</div>';
                return;
            }

            filtered.forEach(wb => {
                const bindAiName = wb.aiId === 'all' ? '全局通用' : (aiList.find(a => a.id == wb.aiId)?.name || '未知角色');
                const card = document.createElement('div');
                card.className = 'neo-card';
                card.onclick = () => openWbDrawer(wb.id);
                card.innerHTML = `
                    <div style="font-size:16px; font-weight:bold; margin-bottom:8px; display:flex; justify-content:space-between;">
                        <span>${wb.keyword}</span>
                        <span style="font-size:12px; font-weight:normal; background:#fff; padding:2px 8px; border-radius:10px; color:#666; box-shadow:inset 2px 2px 4px #ddd;">${bindAiName}</span>
                    </div>
                    <div style="font-size:13px; color:#666; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${wb.content}</div>
                `;
                listContainer.appendChild(card);
            });
        }

        function openWbDrawer(editId = null) {
            currentEditWbId = editId;
            const bindSelect = document.getElementById('wb-ai-bind');
            bindSelect.innerHTML = '<option value="all">绑定到所有 AI 角色</option>';
            aiList.forEach(a => bindSelect.appendChild(new Option(a.name, a.id)));

            if (editId) {
                const wb = worldbooks.find(w => w.id === editId);
                document.getElementById('drawer-wb-title').innerText = '编辑条目';
                document.getElementById('wb-keyword').value = wb.keyword;
                document.getElementById('wb-category').value = wb.category || '';
                document.getElementById('wb-content').value = wb.content;
                bindSelect.value = wb.aiId || 'all';
                document.getElementById('wb-delete-btn').style.display = 'block';
            } else {
                document.getElementById('drawer-wb-title').innerText = '新建条目';
                document.getElementById('wb-keyword').value = '';
                document.getElementById('wb-category').value = currentWbCat !== '全部' ? currentWbCat : '';
                document.getElementById('wb-content').value = '';
                bindSelect.value = 'all';
                document.getElementById('wb-delete-btn').style.display = 'none';
            }
            openDrawer('drawer-wb');
        }

        function saveWb() {
            const keyword = document.getElementById('wb-keyword').value.trim();
            const category = document.getElementById('wb-category').value.trim() || '未分类';
            const content = document.getElementById('wb-content').value.trim();
            const aiId = document.getElementById('wb-ai-bind').value;

            if(!keyword || !content) return showToast('关键词和内容不能为空');

            if (currentEditWbId) {
                const wb = worldbooks.find(w => w.id === currentEditWbId);
                wb.keyword = keyword; wb.category = category; wb.content = content; wb.aiId = aiId;
            } else {
                worldbooks.unshift({ id: Date.now(), keyword, category, content, aiId });
            }

            localStorage.setItem('ai_worldbooks', JSON.stringify(worldbooks));
            closeDrawer('drawer-wb');
            renderWbCategories();
            renderWbList();
            showToast('世界书条目保存成功');
        }

        function deleteWb() {
            if(!confirm('确定要删除此设定吗？')) return;
            worldbooks = worldbooks.filter(w => w.id !== currentEditWbId);
            localStorage.setItem('ai_worldbooks', JSON.stringify(worldbooks));
            closeDrawer('drawer-wb');
            renderWbCategories();
            renderWbList();
            showToast('条目已删除');
        }

        // ================= 聊天室核心逻辑 =================
        let currentChatId = null;
        
        // 修改：内置AI切分提示词，强制AI通过分隔符拆分短句
        const INTERNAL_SYSTEM_PROMPT = `你正在和一个真实的人类在手机聊天软件上对话。请完全代入你的人设进行对话，绝对不要提及你是一个AI、模型或程序。你的回复应该是简短的、口语化的，就像发短信一样，符合角色的性格。
【非常重要】：为了模仿真人连续打字聊天的习惯，如果你的回复超过一两句话，你必须把你的回复拆分成2到5条极短的消息。每条独立的消息之间【必须使用 "|||" 作为分隔符】！绝对不要输出一长串文字，而是像发微信一样一条一条发。
例如你的回复格式必须是：在吗？|||我今天遇到个好玩的事|||你想听吗？`;

        function openChat(id) {
            currentChatId = id;
            const ai = aiList.find(c => c.id === id);
            document.getElementById('chat-title').innerText = ai.name;
            openPage('chat-page');
            renderMessages();
        }

        function renderMessages() {
            const ai = aiList.find(c => c.id === currentChatId);
            const currentUser = userProfiles.find(p => p.id === ai.userId) || userProfiles[0];
            
            const area = document.getElementById('msg-area');
            area.innerHTML = '';
            if(ai.prompt) area.innerHTML += `<div class="bubble system">AI设定: ${ai.prompt}</div>`;
            if(currentUser.prompt) area.innerHTML += `<div class="bubble system">我的设定: ${currentUser.prompt}</div>`;
            
            ai.history.forEach(msg => {
                const row = document.createElement('div');
                row.className = `message-row ${msg.role === 'user' ? 'me' : ''}`;
                const av = msg.role === 'user' ? currentUser.avatar : ai.avatar;
                row.innerHTML = `<img class="msg-avatar" src="${av}"><div class="bubble ${msg.role === 'user' ? 'me' : 'ai'}">${msg.content}</div>`;
                area.appendChild(row);
            });
            area.scrollTop = area.scrollHeight;
        }

        // 修改：只发送用户的消息，不触发AI
        function sendOnly() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            const ai = aiList.find(c => c.id === currentChatId);
            ai.history.push({ role: 'user', content: text });
            localStorage.setItem('ai_list_v2', JSON.stringify(aiList));
            renderMessages();
            input.value = '';
        }

        // 修改：主动触发API生成回复
        async function generateReply() {
            if(!config.key || !config.url) return showToast('请先去配置 API！');
            
            const ai = aiList.find(c => c.id === currentChatId);
            if(ai.history.length === 0) return showToast('请先发送一条消息！');
            const currentUser = userProfiles.find(p => p.id === ai.userId) || userProfiles[0];

            const btn = document.getElementById('generate-btn');
            btn.disabled = true; btn.innerText = '⏳';

            let finalSystemPrompt = INTERNAL_SYSTEM_PROMPT;
            finalSystemPrompt += `\n\n对话中你的身份设定是：${ai.prompt || '无'}`;
            finalSystemPrompt += `\n\n与你对话的用户名为“${currentUser.name}”，他的身份设定是：${currentUser.prompt || '无'}`;

            // --- 动态植入世界书 ---
            let wbPrompt = "";
            let recentTextContext = ai.history.slice(-6).map(m => m.content).join('\n');
            worldbooks.forEach(wb => {
                if ((wb.aiId === 'all' || wb.aiId == currentChatId) && recentTextContext.includes(wb.keyword)) {
                    wbPrompt += `\n[世界设定-${wb.keyword}]: ${wb.content}`;
                }
            });
            if (wbPrompt) {
                finalSystemPrompt += `\n\n【注意，目前环境/设定触发了以下背景知识，请自然地在对话中结合这些设定】：${wbPrompt}`;
            }
            // ------------------------

            let payload = [{ role: 'system', content: finalSystemPrompt }];
            payload = payload.concat(ai.history.slice(-10)); 

            try {
                const endpoint = getEndpoint(config.url) + '/chat/completions';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
                    body: JSON.stringify({ model: config.model || 'gpt-3.5-turbo', messages: payload })
                });

                if(!res.ok) throw new Error(await res.text());
                
                const data = await res.json();
                const rawReply = data.choices[0].message.content;
                
                // 【核心修改】将 AI 返回的字符串通过 ||| 拆分成多个短句数组
                const splitReplies = rawReply.split('|||').map(s => s.trim()).filter(s => s.length > 0);
                
                // 将拆分后的短句循环存入聊天记录
                splitReplies.forEach(msg => {
                    ai.history.push({ role: 'assistant', content: msg });
                });

                localStorage.setItem('ai_list_v2', JSON.stringify(aiList));
                renderMessages();

            } catch(e) {
                alert('获取回复失败:\n' + e.message);
            } finally {
                btn.disabled = false; btn.innerText = '🌀';
            }
        }

        // 修改：回车键仅发送用户消息
        document.getElementById('chat-input').addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault(); 
                sendOnly();
            }
        });

    </script>
</body>
</html>
