
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Fullscreen OS</title>
<style>
  /* ====== 全局与基础样式 ====== */
  :root {
    --bg-color: #000000;
    --panel-bg: rgba(28, 28, 30, 0.95);
    --input-bg: rgba(44, 44, 46, 1);
    --text-main: #ffffff;
    --text-dim: #8e8e93;
    --accent: #0a84ff;
    --dock-bg: rgba(20, 20, 20, 0.6);
    --radius-l: 24px;
    --safe-area-top: 40px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body {
    width: 100vw; height: 100vh; background-color: #111;
    background-image: var(--user-bg-image, none); background-size: cover; background-position: center;
    font-family: var(--user-font, -apple-system, sans-serif); color: var(--text-main);
    overflow: hidden; display: flex; flex-direction: column; transition: background-image 0.5s ease;
  }
  .wallpaper-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); pointer-events: none; z-index: 0; }

  /* ====== 顶部状态栏与主屏幕 ====== */
  .status-bar { padding: 15px 25px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 500; z-index: 10; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
  .home-screen { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 10vh; z-index: 5; transition: opacity 0.3s, transform 0.3s; }
  .clock-area { text-align: center; margin-bottom: 60px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
  .time { font-size: 72px; font-weight: 200; letter-spacing: -1px; }
  .date { font-size: 18px; opacity: 0.8; margin-top: 5px; }

  .app-grid { display: flex; gap: 40px; justify-content: center; width: 100%; max-width: 600px; flex-wrap: wrap; }
  .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.1s; }
  .app-item:active { transform: scale(0.95); }
  .app-icon { width: 72px; height: 72px; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 32px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); }
  .app-icon.chat-icon { background: #fff; color: #000; }
  .app-name { font-size: 13px; margin-top: 10px; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

  /* ====== Dock 栏 ====== */
  .dock-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; }
  .dock { background: var(--dock-bg); backdrop-filter: blur(20px); padding: 15px 25px; border-radius: 35px; display: flex; gap: 30px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }

  /* ====== App 容器 ====== */
  .app-view { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000; z-index: 20; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .app-view.active { transform: translateX(0); }
  .app-header { height: 90px; padding: var(--safe-area-top) 20px 10px; background: var(--panel-bg); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: space-between; font-size: 20px; font-weight: 600; }
  .header-actions { display: flex; gap: 15px; }
  .icon-btn { font-size: 22px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.1); cursor: pointer; transition: background 0.2s; }
  .icon-btn:hover { background: rgba(255,255,255,0.2); }
  .app-content { flex: 1; overflow-y: auto; padding: 20px; background: #000; position: relative; }

  /* ====== 世界书 专属样式 ====== */
  .category-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
  .category-scroll::-webkit-scrollbar { display: none; }
  .cat-chip { padding: 8px 16px; background: var(--input-bg); border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
  .cat-chip.active { background: var(--accent); color: #fff; font-weight: bold; }
  .entry-card { background: var(--input-bg); padding: 15px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; transition: transform 0.1s; border: 1px solid #333; }
  .entry-card:active { transform: scale(0.98); background: #333; }
  .entry-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; color: var(--accent); }
  .entry-desc { font-size: 13px; color: var(--text-dim); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .entry-meta { font-size: 11px; color: #666; margin-top: 8px; display: flex; gap: 10px; }

  /* ====== 弹窗/模态框 ====== */
  .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.3s; display: flex; justify-content: center; align-items: center; }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-card { width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; background: #1c1c1e; border-radius: var(--radius-l); padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #333; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .modal-overlay.show .modal-card { transform: scale(1); }
  .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; text-align: center; }

  /* ====== 表单 ====== */
  .form-group { margin-bottom: 15px; }
  .form-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: block; }
  .form-input, .form-textarea, .form-select { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent); }
  .form-textarea { height: 100px; resize: none; }
  .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  .btn-secondary { background: #333; color: #fff; margin-top: 10px; }
  
  /* ====== 全局动态提示 Toast ====== */
  .toast-container { position: fixed; top: 20%; left: 50%; transform: translateX(-50%) scale(0.9); background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(15px); padding: 20px 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 30px rgba(0,0,0,0.5); text-align: center; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .toast-container.show { opacity: 1; transform: translateX(-50%) scale(1); }
  .toast-icon { font-size: 36px; margin-bottom: 10px; }
  .toast-text { font-size: 15px; font-weight: bold; color: #fff; }

  /* 底部返回条 */
  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 140px; height: 5px; background: rgba(255,255,255,0.4); border-radius: 10px; z-index: 100; cursor: pointer; }
</style>
</head>
<body>

<div class="wallpaper-overlay"></div>
<div class="status-bar"><span>5G</span><span>🔋 100%</span></div>

<!-- 全局 Toast 提示 -->
<div class="toast-container" id="global-toast">
  <div class="toast-icon" id="toast-icon">✅</div>
  <div class="toast-text" id="toast-text">操作成功</div>
</div>

<!-- ================= 主屏幕 ================= -->
<div class="home-screen" id="home-screen">
  <div class="clock-area"><div class="time" id="clock">10:30</div><div class="date" id="date">3月2日 星期一</div></div>
  <div class="app-grid">
    <div class="app-item" onclick="openApp('chat-app')"><div class="app-icon chat-icon">⚪</div><div class="app-name">聊天</div></div>
    <div class="app-item" onclick="openApp('worldbook-app')"><div class="app-icon">🌍</div><div class="app-name">世界书</div></div>
    <div class="app-item" onclick="openApp('beautify-app')"><div class="app-icon" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color:#333;">🎨</div><div class="app-name">美化</div></div>
  </div>
</div>

<div class="dock-container">
  <div class="dock"><div class="app-item" onclick="openApp('api-app')"><div class="app-icon" style="width: 50px; height: 50px; font-size: 24px; border-radius: 14px;">⚙️</div></div></div>
</div>

<!-- ================= 1. 聊天 App ================= -->
<div class="app-view" id="chat-app">
  <div class="app-header">
    <span>聊天</span>
    <div class="header-actions">
      <div class="icon-btn" onclick="showModal('modal-create-user')" title="创建我的马甲">👤</div>
      <div class="icon-btn" onclick="showModal('modal-create-ai')" title="创建AI角色">🤖</div>
    </div>
  </div>
  <div class="app-content"><div style="height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #666;">💬 暂无对话</div></div>
</div>

<!-- ================= 2. 世界书 App ================= -->
<div class="app-view" id="worldbook-app">
  <div class="app-header">
    <span>世界书</span>
    <div class="header-actions">
      <div class="icon-btn" onclick="showModal('modal-create-category')" title="新建分类">📁</div>
      <div class="icon-btn" onclick="showModal('modal-create-entry')" title="新建条目">📝</div>
    </div>
  </div>
  <div class="app-content">
    <div class="form-group"><input type="text" class="form-input" placeholder="🔍 搜索条目..." style="border-radius: 20px; background: rgba(255,255,255,0.1);"></div>
    <!-- 分类滑动栏 -->
    <div class="category-scroll" id="wb-categories-container">
      <!-- 动态渲染 -->
    </div>
    <!-- 条目列表 -->
    <div id="wb-entries-container">
      <!-- 动态渲染 -->
    </div>
  </div>
</div>

<!-- ================= 3. 美化 App ================= -->
<div class="app-view" id="beautify-app">
  <div class="app-header">个性化</div>
  <div class="app-content">
    <div class="form-group" style="background: #1c1c1e; padding: 20px; border-radius: 16px;">
      <h3 style="margin-bottom: 15px; font-size: 16px;">🖼️ 桌面壁纸</h3>
      <input type="text" class="form-input" id="bg-url-input" placeholder="网络图片链接 https://..." style="margin-bottom: 10px;">
      <div style="background: var(--input-bg); padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 10px;">
        <span>📁本地</span><input type="file" id="bg-file-input" accept="image/*" style="width: 100%;">
      </div>
    </div>
    <div class="form-group" style="background: #1c1c1e; padding: 20px; border-radius: 16px;">
      <h3 style="margin-bottom: 15px; font-size: 16px;">🔤 全局字体</h3>
      <input type="text" class="form-input" id="font-url-input" placeholder="TTF 字体链接 https://...">
    </div>
    <button class="btn-primary" onclick="saveBeautifyConfig()">💾 保存当前配置</button>
  </div>
</div>

<!-- ================= 4. API 设置 App ================= -->
<div class="app-view" id="api-app">
  <div class="app-header">API 连接</div>
  <div class="app-content">
    <div class="form-group"><label class="form-label">API Address</label><input type="text" class="form-input" value="https://gcli.ggchan.dev/v1"></div>
    <div class="form-group"><label class="form-label">API Key (公益站留空)</label><input type="password" class="form-input" placeholder="非公益站请填写 sk-..."></div>
    <button class="btn-primary btn-secondary" id="fetch-btn" onclick="fetchModels()">🔄 拉取模型列表</button>
    <div class="form-group" style="margin-top: 15px;">
      <label class="form-label">选择模型</label>
      <select class="form-select" id="model-select"><option>请先拉取模型...</option></select>
    </div>
    <button class="btn-primary" onclick="saveApi()" style="margin-top: 30px;">✅ 保存连接</button>
  </div>
</div>


<!-- ================= 模态框区 ================= -->

<!-- 1. 聊天：创建 AI -->
<div class="modal-overlay" id="modal-create-ai">
  <div class="modal-card">
    <div class="modal-title">🤖 创建 AI 角色</div>
    <div class="form-group"><label class="form-label">名称</label><input type="text" class="form-input" id="ai-name"></div>
    <div class="form-group"><label class="form-label">系统设定 (Prompt)</label><textarea class="form-textarea" id="ai-prompt"></textarea></div>
    <button class="btn-primary" onclick="saveCharacter('ai')">创建角色</button>
    <button class="btn-primary btn-secondary" onclick="closeModal('modal-create-ai')">取消</button>
  </div>
</div>

<!-- 2. 聊天：创建 马甲 -->
<div class="modal-overlay" id="modal-create-user">
  <div class="modal-card">
    <div class="modal-title">👤 创建我的马甲</div>
    <div class="form-group"><label class="form-label">显示名称</label><input type="text" class="form-input" id="user-name"></div>
    <div class="form-group"><label class="form-label">我的设定/备注</label><textarea class="form-textarea"></textarea></div>
    <button class="btn-primary" onclick="saveCharacter('user')">保存马甲</button>
    <button class="btn-primary btn-secondary" onclick="closeModal('modal-create-user')">取消</button>
  </div>
</div>

<!-- 3. 世界书：创建分类 -->
<div class="modal-overlay" id="modal-create-category">
  <div class="modal-card">
    <div class="modal-title">📁 新建分类</div>
    <div class="form-group"><label class="form-label">分类名称</label><input type="text" class="form-input" id="new-category-name" placeholder="例如：地点、魔法、物品"></div>
    <button class="btn-primary" onclick="saveCategory()">保存分类</button>
    <button class="btn-primary btn-secondary" onclick="closeModal('modal-create-category')">取消</button>
  </div>
</div>

<!-- 4. 世界书：创建条目 -->
<div class="modal-overlay" id="modal-create-entry">
  <div class="modal-card">
    <div class="modal-title">📝 新建条目</div>
    <div class="form-group"><label class="form-label">触发词 (Keyword)</label><input type="text" class="form-input" id="entry-keyword" placeholder="例如：世界树"></div>
    <div class="form-group">
      <label class="form-label">所属分类</label>
      <select class="form-select" id="entry-category-select">
        <!-- 动态填充 -->
      </select>
    </div>
    <div class="form-group"><label class="form-label">条目内容 (Content)</label><textarea class="form-textarea" id="entry-content" placeholder="详细的设定描述..."></textarea></div>
    <div class="form-group">
      <label class="form-label">绑定到角色 (可选)</label>
      <select class="form-select" id="entry-bind"><option value="通用">所有角色通用</option></select>
    </div>
    <button class="btn-primary" onclick="saveEntry()">保存条目</button>
    <button class="btn-primary btn-secondary" onclick="closeModal('modal-create-entry')">取消</button>
  </div>
</div>

<!-- 5. 世界书：查看条目详情 -->
<div class="modal-overlay" id="modal-view-entry">
  <div class="modal-card">
    <div class="modal-title" id="view-keyword" style="color:var(--accent); text-align:left; margin-bottom: 5px;">触发词</div>
    <div style="font-size:12px; color:#888; margin-bottom: 15px;">
      <span style="background:#333; padding:3px 8px; border-radius:10px;" id="view-category">分类</span>
      <span style="background:#333; padding:3px 8px; border-radius:10px;" id="view-bind">绑定</span>
    </div>
    <div style="background: var(--input-bg); padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; margin-bottom: 20px;" id="view-content">内容...</div>
    <button class="btn-primary" onclick="closeModal('modal-view-entry')">关 闭</button>
  </div>
</div>

<!-- 全局返回条 -->
<div class="home-indicator" onclick="goHome()"></div>

<script>
  // ================= 核心工具 =================
  function showToast(text, icon = '✅') {
    const toast = document.getElementById('global-toast');
    document.getElementById('toast-icon').innerText = icon;
    document.getElementById('toast-text').innerText = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function showModal(id) { document.getElementById(id).classList.add('show'); }
  function closeModal(id) { document.getElementById(id).classList.remove('show'); }

  // ================= 导航与时钟 =================
  setInterval(() => {
    const now = new Date();
    document.getElementById('clock').innerText = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    
    const weekday = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"][now.getDay()];
    document.getElementById('date').innerText = now.getMonth()+1 + "月" + now.getDate() + "日 " + weekday;
  }, 1000);

  function openApp(id) {
    document.getElementById(id).classList.add('active');
    document.getElementById('home-screen').style.opacity = "0";
    document.querySelector('.dock-container').style.opacity = "0";
    document.querySelector('.dock-container').style.pointerEvents = "none";
  }

  function goHome() {
    document.querySelectorAll('.app-view').forEach(el => el.classList.remove('active'));
    document.getElementById('home-screen').style.opacity = "1";
    document.querySelector('.dock-container').style.opacity = "1";
    document.querySelector('.dock-container').style.pointerEvents = "auto";
  }

  // ================= 聊天 App 逻辑 =================
  function saveCharacter(type) {
    const nameInput = document.getElementById(type === 'ai' ? 'ai-name' : 'user-name');
    if(!nameInput.value) { showToast('请输入名称', '⚠️'); return; }
    showToast(`成功创建${type === 'ai' ? '角色' : '马甲'}：${nameInput.value}`, '🎉');
    nameInput.value = '';
    closeModal(type === 'ai' ? 'modal-create-ai' : 'modal-create-user');
  }

  // ================= 世界书 App 逻辑 (数据+渲染) =================
  let wbCategories = ['默认分类', '地点', '人物志'];
  let wbEntries = [
    { id: 1, keyword: '赛博城 2077', category: '地点', bind: '通用', content: '这是一座充满霓虹灯与高科技犯罪的核心舞台。' }
  ];
  let currentCategory = '全部';

  function renderWorldbook() {
    // 渲染分类 Tabs
    const catContainer = document.getElementById('wb-categories-container');
    let catHtml = `<div class="cat-chip ${currentCategory === '全部' ? 'active' : ''}" onclick="filterCategory('全部')">全部</div>`;
    wbCategories.forEach(cat => {
      catHtml += `<div class="cat-chip ${currentCategory === cat ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat}</div>`;
    });
    catContainer.innerHTML = catHtml;

    // 更新创建条目时的下拉框
    const select = document.getElementById('entry-category-select');
    select.innerHTML = wbCategories.map(c => `<option value="${c}">${c}</option>`).join('');

    // 渲染条目列表
    const entriesContainer = document.getElementById('wb-entries-container');
    const filteredEntries = currentCategory === '全部' ? wbEntries : wbEntries.filter(e => e.category === currentCategory);
    
    if(filteredEntries.length === 0) {
      entriesContainer.innerHTML = `<div style="text-align:center; color:#666; padding: 20px;">当前分类暂无条目</div>`;
      return;
    }
    entriesContainer.innerHTML = filteredEntries.map(entry => `
      <div class="entry-card" onclick="viewEntry(${entry.id})">
        <div class="entry-title">${entry.keyword}</div>
        <div class="entry-desc">${entry.content}</div>
        <div class="entry-meta"><span>📁 ${entry.category}</span> <span>🔗 ${entry.bind}</span></div>
      </div>
    `).join('');
  }

  function filterCategory(cat) { currentCategory = cat; renderWorldbook(); }

  function saveCategory() {
    const name = document.getElementById('new-category-name').value.trim();
    if(!name) { showToast('请输入分类名称', '⚠️'); return; }
    if(wbCategories.includes(name)) { showToast('分类已存在', '⚠️'); return; }
    wbCategories.push(name);
    currentCategory = name;
    renderWorldbook();
    showToast('分类创建成功', '📁');
    document.getElementById('new-category-name').value = '';
    closeModal('modal-create-category');
  }

  function saveEntry() {
    const keyword = document.getElementById('entry-keyword').value.trim();
    const content = document.getElementById('entry-content').value.trim();
    const cat = document.getElementById('entry-category-select').value;
    const bind = document.getElementById('entry-bind').value;
    
    if(!keyword || !content) { showToast('触发词和内容不能为空', '⚠️'); return; }
    
    wbEntries.push({ id: Date.now(), keyword, content, category: cat, bind });
    renderWorldbook();
    showToast('条目保存成功', '📝');
    
    document.getElementById('entry-keyword').value = '';
    document.getElementById('entry-content').value = '';
    closeModal('modal-create-entry');
  }

  function viewEntry(id) {
    const entry = wbEntries.find(e => e.id === id);
    if(!entry) return;
    document.getElementById('view-keyword').innerText = entry.keyword;
    document.getElementById('view-category').innerText = '📁 ' + entry.category;
    document.getElementById('view-bind').innerText = '🔗 ' + entry.bind;
    document.getElementById('view-content').innerText = entry.content;
    showModal('modal-view-entry');
  }

  // 初始化世界书
  renderWorldbook();

  // ================= API 设置逻辑 (适配公益站无密钥) =================
  function fetchModels() {
    const btn = document.getElementById('fetch-btn');
    const select = document.getElementById('model-select');
    const inputs = document.querySelectorAll('.form-input');
    const baseUrl = inputs[0].value.trim();
    const apiKey = inputs[1].value.trim();

    // 仅检查 API 地址是否填写，密钥留空不影响
    if (!baseUrl) {
      showToast('请先填写 API 地址', '⚠️');
      return;
    }

    btn.innerText = "⏳ 正在拉取...";
    btn.style.opacity = "0.7";
    select.innerHTML = '<option>正在拉取模型列表...</option>';

    // 构建请求头：有密钥则带，无密钥则不带
    const requestHeaders = {
      'Content-Type': 'application/json'
    };
    if (apiKey) {
      requestHeaders['Authorization'] = 'Bearer ' + apiKey;
    }

    fetch(`${baseUrl}/models`, {
      method: 'GET',
      headers: requestHeaders
    })
    .then(res => {
      if (!res.ok) throw new Error('接口响应异常：' + res.status);
      return res.json();
    })
    .then(data => {
      if (!data.data || data.data.length === 0) {
        select.innerHTML = '<option>未获取到模型</option>';
        showToast('成功拉取 0 个模型', 'ℹ️');
        return;
      }
      select.innerHTML = data.data.map(m => `<option value="${m.id}">${m.id}</option>`).join('');
      showToast('成功拉取 ' + data.data.length + ' 个模型', '✅');
    })
    .catch(err => {
      console.error('拉取失败详情：', err);
      select.innerHTML = '<option>拉取失败，检查地址或网络</option>';
      showToast('拉取失败', '❌');
    })
    .finally(() => {
      btn.innerText = "🔄 重新拉取";
      btn.style.opacity = "1";
    });
  }

  function saveApi() {
    showToast('API 配置已保存', '🔌');
    setTimeout(goHome, 1500);
  }

  // ================= 美化 App 逻辑 =================
  function saveBeautifyConfig() {
    const bgUrl = document.getElementById('bg-url-input').value;
    const fontUrl = document.getElementById('font-url-input').value;
    const fileInput = document.getElementById('bg-file-input');

    if (fileInput.files && fileInput.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.body.style.setProperty('--user-bg-image', 'url(' + e.target.result + ')');
      };
      reader.readAsDataURL(fileInput.files[0]);
    } else if (bgUrl) {
      document.body.style.setProperty('--user-bg-image', 'url(' + bgUrl + ')');
    }

    if (fontUrl) {
      const fontName = 'CustomFont';
      const fontStyle = document.createElement('style');
      fontStyle.innerHTML = "@font-face { font-family: '" + fontName + "'; src: url('" + fontUrl + "'); }";
      document.head.appendChild(fontStyle);
      document.body.style.setProperty('--user-font', "'" + fontName + "', sans-serif");
    }

    showToast('个性化配置已生效', '🎨');
  }
</script>
</body>
</html>
