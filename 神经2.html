<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI OS Ultimate V3 (已修改)</title>
    <style>
        /* --- 全局变量与核心锁定 --- */
        :root {
            --bg-img: linear-gradient(135deg, #1c1c1c 0%, #3a3a3a 100%);
            --sys-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            --accent: #007aff;
        }

        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--sys-font); height: 100vh; width: 100vw; overflow: hidden; touch-action: none;
            background: var(--bg-img); background-size: cover; background-position: center;
            color: white; position: fixed; top: 0; left: 0; transition: background 0.5s ease;
        }
        input[type="file"] { display: none; }

        /* --- 状态栏 --- */
        .status-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 44px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; font-size: 14px; font-weight: 600; z-index: 2000;
            pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* --- 桌面与图标 --- */
        .desktop {
            width: 100%; height: 100%; padding-top: 60px;
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
        }
        .app-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; 
            width: 100%; max-width: 480px; padding: 20px;
        }
        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.1s; }
        .app-item:active { transform: scale(0.9); opacity: 0.8; }
        .app-icon {
            width: 62px; height: 62px; border-radius: 14px; display: flex; justify-content: center; align-items: center;
            font-size: 30px; margin-bottom: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: white; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); overflow: hidden;
        }
        .app-name { font-size: 12px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        /* --- 底部 Dock --- */
        .dock-container {
            margin-top: auto; margin-bottom: 35px; height: 90px; padding: 0 25px; 
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center; gap: 25px;
        }

        /* --- APP 窗口通用 --- */
        .app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f2f2f7; color: #000; z-index: 1000;
            display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .app-window.active { transform: translateY(0); }
        .app-header {
            height: 50px; padding-top: 5px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 15px; padding-right: 15px; background: rgba(255,255,255,0.95); border-bottom: 1px solid rgba(0,0,0,0.1);
            font-size: 17px; font-weight: 600; position: relative; z-index: 10;
        }
        .header-btn { color: var(--accent); font-size: 16px; font-weight: 400; cursor: pointer; min-width: 60px; }
        .header-btn.right { text-align: right; font-size: 24px; line-height: 1;}
        .app-body { padding: 20px; overflow-y: auto; flex: 1; touch-action: pan-y; }

        /* --- UI 组件 --- */
        .card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #888; font-size: 12px; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px; border: 1px solid #e5e5ea; border-radius: 8px; font-size: 16px; outline: none; background: #f9f9f9;
        }
        .btn-primary { 
            width: 100%; padding: 14px; background: var(--accent); color: white; border: none; 
            border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; margin-bottom: 10px;
        }
        .btn-danger { background: #ff3b30; }

        /* --- 【新增】保存成功弹窗样式 --- */
        .success-popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none; /* 默认隐藏 */
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .success-popup-content {
            background: white;
            color: black;
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: scale(0.9);
            animation: popup-scale 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes popup-scale {
            to { transform: scale(1); }
        }
        .success-popup-content .icon {
            font-size: 48px;
        }
        .success-popup-content .text {
            font-size: 18px;
            font-weight: 600;
            margin-top: 15px;
        }
        
        /* 标签页切换 */
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; flex-shrink: 0;}
        .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: bold; color: #888; cursor: pointer; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* 图片上传区 */
        .upload-area {
            width: 80px; height: 80px; border-radius: 40px; background: #eee; margin: 0 auto 15px auto; overflow: hidden; position: relative; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;
        }
        .upload-area img { width: 100%; height: 100%; object-fit: cover; }
        .upload-placeholder { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 30px; color: #ccc; }

        /* --- 聊天相关 --- */
        .view-container { display: none; flex-direction: column; height: 100%; }
        .view-container.active { display: flex; }
        .contact-row { display: flex; align-items: center; padding: 12px 16px; background: #fff; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .c-avatar { width: 50px; height: 50px; border-radius: 25px; background: #eee; display: flex; justify-content: center; align-items: center; font-size: 24px; margin-right: 15px; overflow: hidden; flex-shrink: 0;}
        .c-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-area { flex: 1; background: #efeff4; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; touch-action: pan-y;}
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 16px; line-height: 1.4; word-wrap: break-word; display: flex; gap: 10px;}
        .msg-bubble img { width: 30px; height: 30px; border-radius: 15px; object-fit: cover; flex-shrink: 0; align-self: flex-end; }
        .msg-left { align-self: flex-start; }
        .msg-left .bubble-content { background: #fff; color: #000; padding: 10px 14px; border-radius: 18px; border-bottom-left-radius: 4px; }
        .msg-right { align-self: flex-end; flex-direction: row-reverse; }
        .msg-right .bubble-content { background: var(--accent); color: #fff; padding: 10px 14px; border-radius: 18px; border-bottom-right-radius: 4px; }
        .chat-input-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: #f9f9f9; border-top: 1px solid #ddd; padding: 10px 15px; padding-bottom: 35px; display: flex; align-items: center; z-index: 20; }
        
        .home-indicator-area { position: fixed; bottom: 0; left: 0; width: 100%; height: 30px; z-index: 3000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .home-indicator { width: 140px; height: 5px; background: rgba(255,255,255,0.5); border-radius: 100px; transition: background 0.3s; }
        body.on-app .home-indicator { background: rgba(0,0,0,0.8); }
    </style>
</head>
<body class="on-desktop">

    <style id="custom-font-style"></style>

    <div class="status-bar">
        <div id="clock">12:00</div>
        <div>5G 🔋</div>
    </div>

    <!-- 桌面 (聊天移到这里) -->
    <div class="desktop" id="desktop">
        <div class="app-grid">
            <div class="app-item" onclick="openApp('app-chat')">
                <div class="app-icon" style="background: white; color: black;">💬</div>
                <div class="app-name">聊天</div>
            </div>
            <div class="app-item" onclick="openApp('app-theme')">
                <div class="app-icon" style="background: linear-gradient(135deg, #FF9A9E, #FECFEF);">🎨</div>
                <div class="app-name">美化</div>
            </div>
            <div class="app-item" onclick="openApp('app-worldbook')">
                <div class="app-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">📖</div>
                <div class="app-name">世界书</div>
            </div>
        </div>
        <!-- Dock (设置移到这里) -->
        <div class="dock-container">
            <div class="app-item" onclick="openApp('app-settings')">
                <div class="app-icon" style="background: #8e8e93; border-radius: 20px;">⚙️</div>
            </div>
        </div>
    </div>

    <!-- === APP 1: 纯粹的系统设置 (API连接) === -->
    <div id="app-settings" class="app-window">
        <div class="app-header">
            <div class="header-btn" onclick="goHome()">❮ 返回</div>
            <div>API 设置</div>
            <div class="header-btn right"></div>
        </div>
        <div class="app-body">
            <div class="card">
                <h3>🔌 大模型接口连接</h3>
                <p style="font-size:12px; color:#888; margin-bottom:15px;">配置您的 OpenAI 或兼容格式的中转 API</p>
                
                <div class="form-group">
                    <label>接口地址 (Base URL)</label>
                    <input type="text" id="cfg-url" placeholder="例如: https://api.openai.com/v1">
                </div>
                <div class="form-group">
                    <label>密钥 (API Key)</label>
                    <input type="password" id="cfg-key" placeholder="sk-...">
                </div>
                
                <div class="form-group">
                    <label>模型选择</label>
                    <div style="display: flex; gap:10px; margin-bottom: 10px;">
                        <input type="text" id="cfg-model" placeholder="填入模型名称, 如 gpt-4o" style="flex:1;">
                        <button class="btn-primary" style="width: auto; padding: 0 15px; font-size:14px; margin:0;" onclick="fetchModels(this)">🔄 拉取模型</button>
                    </div>
                    <!-- 拉取成功后显示的下拉框 -->
                    <select id="cfg-model-select" style="display:none;" onchange="document.getElementById('cfg-model').value = this.value"></select>
                </div>
                
                <button class="btn-primary" onclick="saveSysConfig()">💾 保存 API 配置</button>
            </div>
        </div>
    </div>
    
    <!-- 【新增】保存成功弹窗 HTML 结构 -->
    <div id="save-success-popup" class="success-popup">
        <div class="success-popup-content">
            <div class="icon">✅</div>
            <div class="text">保存成功</div>
        </div>
    </div>


    <!-- === APP 2 & 3: 美化与世界书 (精简代码保留功能) === -->
    <div id="app-theme" class="app-window">
        <div class="app-header"><div class="header-btn" onclick="goHome()">❮ 返回</div><div>美化</div><div class="header-btn right"></div></div>
        <div class="app-body">
            <div class="card">
                <label for="bg-upload" class="btn-primary" style="background:#e5e5ea; color:#000;">📂 从相册选壁纸</label>
                <input type="file" id="bg-upload" accept="image/*" onchange="handleBgUpload(this)">
                <div class="form-group"><label>或输入图片链接</label><input type="text" id="theme-bg"></div>
                <button class="btn-primary" onclick="applyThemeUrl()">应用链接壁纸</button>
                <button class="btn-primary btn-danger" onclick="resetTheme()">恢复默认深色</button>
            </div>
        </div>
    </div>

    <div id="app-worldbook" class="app-window">
        <div class="app-header"><div class="header-btn" onclick="goHome()">❮ 返回</div><div>世界书</div><div class="header-btn right" onclick="wbAddNew()">+</div></div>
        <div class="app-body">
            <div id="wb-list"></div>
            <div id="wb-editor" style="display:none; margin-top: 20px;">
                <div class="card" style="border: 2px solid var(--accent);">
                    <div class="form-group"><label>条目名称</label><input type="text" id="wb-title-input"></div>
                    <div class="form-group"><label>详细设定</label><textarea id="wb-content-input" rows="6"></textarea></div>
                    <button class="btn-primary" onclick="wbSave()">保存</button>
                    <button class="btn-primary btn-danger" onclick="wbCancel()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- === APP 4: 聊天 (含 AI 角色与多重玩家设定) === -->
    <div id="app-chat" class="app-window">
        
        <!-- 主列表视图 -->
        <div id="view-contacts" class="view-container active">
            <div class="app-header">
                <div class="header-btn" onclick="goHome()">关闭</div>
                <div>聊天中心</div>
                <div class="header-btn right" onclick="showCreateMenu()">⊕</div>
            </div>
            <!-- 顶部标签页切换 -->
            <div class="tabs">
                <div class="tab active" id="tab-ai" onclick="switchChatTab('ai')">AI 角色</div>
                <div class="tab" id="tab-player" onclick="switchChatTab('player')">我的多重身份</div>
            </div>
            
            <!-- AI 列表区 -->
            <div class="app-body" id="list-ai" style="padding:0;"></div>
            
            <!-- 玩家身份列表区 -->
            <div class="app-body" id="list-player" style="padding:0; display:none;"></div>
        </div>

        <!-- 聊天框 -->
        <div id="view-dialog" class="view-container">
            <div class="app-header">
                <div class="header-btn" onclick="navChat('view-contacts')">❮</div>
                <div id="chat-header-name">名字</div>
                <div class="header-btn right"></div>
            </div>
            <div id="chat-box" class="chat-area"></div>
            <div class="chat-input-bar">
                <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ccc; outline:none;" placeholder="输入消息...">
                <div onclick="sendMessage()" style="margin-left:10px; color:var(--accent); font-weight:bold; cursor:pointer; padding: 5px 10px;">发送</div>
            </div>
        </div>

        <!-- 创建 AI 角色 -->
        <div id="view-create-ai" class="view-container">
            <div class="app-header">
                <div class="header-btn" onclick="navChat('view-contacts')">取消</div><div>创建 AI</div><div class="header-btn right"></div>
            </div>
            <div class="app-body">
                <div class="card">
                    <div style="text-align:center;">
                        <label for="ai-avatar-upload" class="upload-area" id="ai-avatar-preview"><div class="upload-placeholder">🤖</div></label>
                        <input type="file" id="ai-avatar-upload" accept="image/*" onchange="handleImageUpload(this, 'temp_ai_img', 'ai-avatar-preview')">
                    </div>
                    <div class="form-group"><label>Emoji 头像(无图时显示)</label><input type="text" id="ai-emoji" value="🤖"></div>
                    <div class="form-group"><label>角色名字</label><input type="text" id="ai-name"></div>
                    <div class="form-group"><label>核心人设 (Prompt)</label><textarea id="ai-prompt" rows="3"></textarea></div>
                    
                    <div class="form-group">
                        <label>👤 面对此角色时，扮演哪个玩家身份？</label>
                        <select id="ai-bind-persona" style="background:#eaf2fb; border-color:#b6d4f6;"></select>
                    </div>

                    <div class="form-group">
                        <label>📖 绑定世界书</label>
                        <div id="ai-wb-select-list" style="background:#f9f9f9; padding:10px; border-radius:8px; max-height:150px; overflow-y:auto;"></div>
                    </div>
                    <button class="btn-primary" onclick="createAIRole()">完成创建</button>
                </div>
            </div>
        </div>

        <!-- 创建 玩家身份 -->
        <div id="view-create-player" class="view-container">
            <div class="app-header">
                <div class="header-btn" onclick="navChat('view-contacts')">取消</div><div>新建玩家身份</div><div class="header-btn right"></div>
            </div>
            <div class="app-body">
                <div class="card">
                    <div style="text-align:center;">
                        <label for="player-avatar-upload" class="upload-area" id="player-avatar-preview"><div class="upload-placeholder">👤</div></label>
                        <input type="file" id="player-avatar-upload" accept="image/*" onchange="handleImageUpload(this, 'temp_player_img', 'player-avatar-preview')">
                        <p style="font-size:12px; color:#888;">上传属于这个身份的头像</p>
                    </div>
                    <div class="form-group"><label>身份名称</label><input type="text" id="player-name" placeholder="例如：星舰指挥官"></div>
                    <div class="form-group"><label>身份简介 (AI会知道这些)</label><textarea id="player-desc" rows="4" placeholder="例如：性格冷酷，掌握着舰队的生杀大权..."></textarea></div>
                    <button class="btn-primary" onclick="createPlayerPersona()">保存身份</button>
                </div>
            </div>
        </div>

    </div>

    <!-- 底部小横条 -->
    <div class="home-indicator-area" onclick="goHome()"><div class="home-indicator"></div></div>

<script>
    // --- 图片压缩工具 ---
    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ratio = 150 / img.width;
                canvas.width = 150; canvas.height = img.height > img.width ? img.height * ratio : 150;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                callback(canvas.toDataURL('image/jpeg', 0.7)); 
            }
        }
    }

    let tempImages = { temp_ai_img: "", temp_player_img: "" };
    function handleImageUpload(input, tempKey, previewId) {
        if(input.files && input.files[0]) {
            compressImage(input.files[0], base64 => {
                tempImages[tempKey] = base64;
                document.getElementById(previewId).innerHTML = `<img src="${base64}">`;
            });
        }
    }

    // --- 系统基础 ---
    setInterval(() => document.getElementById('clock').innerText = new Date().toTimeString().slice(0,5), 1000);

    function openApp(id) {
        document.getElementById(id).classList.add('active');
        document.body.classList.remove('on-desktop'); document.body.classList.add('on-app');
        document.getElementById('desktop').style.transform = "scale(0.9)"; document.getElementById('desktop').style.opacity = "0";
        if(id === 'app-settings') loadSettingsUI();
        if(id === 'app-chat') { switchChatTab('ai'); navChat('view-contacts'); }
        if(id === 'app-worldbook') wbRender();
    }
    function goHome() {
        document.querySelectorAll('.app-window').forEach(el => el.classList.remove('active'));
        document.body.classList.add('on-desktop'); document.body.classList.remove('on-app');
        document.getElementById('desktop').style.transform = "scale(1)"; document.getElementById('desktop').style.opacity = "1";
    }

    // =======================================================
    // APP 1: 设置与 API 逻辑 - 【修改后的代码】
    // =======================================================
    const config = {
        url: localStorage.getItem('cfg_url') || '',
        key: localStorage.getItem('cfg_key') || '',
        model: localStorage.getItem('cfg_model') || 'gpt-4o'
    };

    function loadSettingsUI() {
        // 如果用户之前存的是 completion 地址，自动转换成 base url
        let displayUrl = config.url;
        if (displayUrl.includes('/chat/completions')) {
            displayUrl = displayUrl.split('/v1/')[0] + '/v1';
        }
        document.getElementById('cfg-url').value = displayUrl;
        document.getElementById('cfg-key').value = config.key;
        document.getElementById('cfg-model').value = config.model;
        document.getElementById('cfg-model-select').style.display = 'none';
    }

    function saveSysConfig() {
        // 保存时，确保URL以/v1结尾，但不要多加
        let rawUrl = document.getElementById('cfg-url').value.trim();
        if (rawUrl.endsWith('/')) {
            rawUrl = rawUrl.slice(0, -1); // 去掉末尾的 /
        }
        
        // 关键一步：如果用户输入的是 full path，我们也存 full path，但在 fetchOpenAI 时会处理
        // 这里为了聊天功能兼容，我们统一保存 chat completions 地址
        let chatCompletionsUrl = rawUrl;
        if (!chatCompletionsUrl.endsWith('/chat/completions')) {
             if (chatCompletionsUrl.endsWith('/v1')) {
                chatCompletionsUrl += '/chat/completions';
             } else if (!chatCompletionsUrl.includes('/v1')) {
                chatCompletionsUrl += '/v1/chat/completions'; // 尝试补全
             } else {
                 // 可能是 `.../v1/xxx` 这样的，我们先假设用户知道自己在做什么
             }
        }

        config.url = chatCompletionsUrl;
        config.key = document.getElementById('cfg-key').value.trim();
        config.model = document.getElementById('cfg-model').value.trim();
        
        localStorage.setItem('cfg_url', config.url);
        localStorage.setItem('cfg_key', config.key);
        localStorage.setItem('cfg_model', config.model);
        
        // 显示自定义的成功弹窗
        const popup = document.getElementById('save-success-popup');
        popup.style.display = 'flex';
        
        // 2秒后自动隐藏
        setTimeout(() => {
            popup.style.display = 'none';
        }, 2000);
    }

    async function fetchModels(btnElem) {
        let urlInput = document.getElementById('cfg-url').value.trim();
        let keyInput = document.getElementById('cfg-key').value.trim();
        if(!urlInput || !keyInput) {
            alert("请先填写接口地址和密钥！");
            return;
        }

        btnElem.innerText = "⏳ 拉取中...";
        btnElem.disabled = true;
        
        // 【优化】智能解析 Base URL：精准截取到 /v1
        let baseUrl = '';
        const v1Index = urlInput.indexOf('/v1');
        if (v1Index !== -1) {
            baseUrl = urlInput.substring(0, v1Index + 3); // 包含 /v1
        } else {
            alert('❌ 格式错误！\n\n接口地址必须包含 /v1，例如: https://api.openai.com/v1');
            btnElem.innerText = "🔄 拉取模型";
            btnElem.disabled = false;
            return;
        }

        try {
            console.log(`正在从 ${baseUrl}/models 拉取模型...`);
            const res = await fetch(`${baseUrl}/models`, {
                method: 'GET', 
                headers: { 
                    'Authorization': `Bearer ${keyInput}` 
                }
            });

            if(!res.ok) {
                // 提供更详细的错误信息
                const errorText = await res.text();
                throw new Error(`HTTP ${res.status}: ${res.statusText}. ${errorText}`);
            }
            const data = await res.json();
            
            if(data && data.data && Array.isArray(data.data) && data.data.length > 0) {
                const selectElem = document.getElementById('cfg-model-select');
                selectElem.innerHTML = '<option value="">-- 点击选择一个模型 --</option>';
                
                // 筛选出包含 'gpt' 和 'dall-e' 的模型并排序
                const sortedModels = data.data
                    .filter(m => m.id.includes('gpt') || m.id.includes('dall-e'))
                    .sort((a, b) => a.id.localeCompare(b.id));

                sortedModels.forEach(m => {
                    selectElem.innerHTML += `<option value="${m.id}">${m.id}</option>`;
                });
                selectElem.style.display = 'block'; // 显示下拉框
                document.getElementById('cfg-model').value = ''; // 清空手动输入框
                alert(`🎉 成功拉取 ${sortedModels.length} 个模型！请在下方下拉列表中选择。`);
            } else {
                alert("✅ 请求成功，但未找到可用模型。\n\n这可能是因为中转API限制，请尝试手动输入模型名称。");
            }
        } catch(e) {
            alert(`❌ 拉取失败！\n\n1. 检查网络连接和密钥是否正确。\n2. 【重要】请确保您是通过本地服务器 (如 VS Code 的 Live Server) 运行此页面，而不是直接打开文件，否则会因跨域问题失败。\n\n详细报错: ${e.message}`);
        } finally {
            btnElem.innerText = "🔄 拉取模型";
            btnElem.disabled = false;
        }
    }


    // ==========================================
    // APP 4: 聊天 (含多重玩家身份)
    // ==========================================
    // 数据隔离：使用新版本避免旧数据冲突
    let aiRoles = JSON.parse(localStorage.getItem('os_ai_roles_v4')) || [];
    let playerPersonas = JSON.parse(localStorage.getItem('os_player_personas')) || [
        { id: 1, name: "默认玩家", desc: "一个普通的旅行者", image: "" }
    ];
    let currentRole = null;
    let worldBook = JSON.parse(localStorage.getItem('os_worldbook')) || [];

    function navChat(viewId) {
        document.querySelectorAll('#app-chat .view-container').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        if(viewId === 'view-contacts') renderChatLists();
    }

    // 切换 AI/身份 标签页
    let currentChatTab = 'ai';
    function switchChatTab(tab) {
        currentChatTab = tab;
        document.getElementById('tab-ai').classList.remove('active');
        document.getElementById('tab-player').classList.remove('active');
        document.getElementById('tab-' + tab).classList.add('active');
        
        document.getElementById('list-ai').style.display = tab === 'ai' ? 'block' : 'none';
        document.getElementById('list-player').style.display = tab === 'player' ? 'block' : 'none';
        renderChatLists();
    }

    function showCreateMenu() {
        if(currentChatTab === 'ai') renderCreateAIUI();
        else renderCreatePlayerUI();
    }

    function renderChatLists() {
        const aiList = document.getElementById('list-ai');
        const playerList = document.getElementById('list-player');
        aiList.innerHTML = ''; playerList.innerHTML = '';

        // 渲染 AI
        aiRoles.forEach(role => {
            const div = document.createElement('div'); div.className = 'contact-row';
            div.onclick = () => startChat(role.id);
            const avatarHtml = role.image ? `<img src="${role.image}">` : role.avatar;
            
            // 找到绑定的玩家身份名字
            const boundPlayer = playerPersonas.find(p => p.id == role.boundPersonaId);
            const playerName = boundPlayer ? boundPlayer.name : "默认玩家";

            div.innerHTML = `
                <div class="c-avatar">${avatarHtml}</div>
                <div style="flex:1;">
                    <div style="font-weight:600; font-size:16px;">${role.name}</div>
                    <div style="font-size:12px; color:#888;">面对此AI，你扮演：[${playerName}]</div>
                </div>
            `;
            aiList.appendChild(div);
        });

        // 渲染 玩家身份
        playerPersonas.forEach((p, index) => {
            const div = document.createElement('div'); div.className = 'contact-row';
            const avatarHtml = p.image ? `<img src="${p.image}">` : `👤`;
            div.innerHTML = `
                <div class="c-avatar">${avatarHtml}</div>
                <div style="flex:1;">
                    <div style="font-weight:600; font-size:16px;">${p.name}</div>
                    <div style="font-size:12px; color:#888;">${p.desc.slice(0, 15)}...</div>
                </div>
                <div style="color:red; font-size:12px; padding:10px;" onclick="event.stopPropagation(); deletePlayer(${index})">删除</div>
            `;
            playerList.appendChild(div);
        });
    }

    // --- 创建玩家身份 ---
    function renderCreatePlayerUI() {
        tempImages.temp_player_img = "";
        document.getElementById('player-avatar-preview').innerHTML = '<div class="upload-placeholder">👤</div>';
        document.getElementById('player-name').value = '';
        document.getElementById('player-desc').value = '';
        navChat('view-create-player');
    }

    function createPlayerPersona() {
        const name = document.getElementById('player-name').value.trim();
        const desc = document.getElementById('player-desc').value.trim();
        if(!name) return alert("身份名称不能为空");
        
        playerPersonas.push({ id: Date.now(), name, desc, image: tempImages.temp_player_img });
        localStorage.setItem('os_player_personas', JSON.stringify(playerPersonas));
        navChat('view-contacts');
    }

    function deletePlayer(index) {
        if(playerPersonas.length <= 1) return alert("至少保留一个玩家身份！");
        if(confirm(`确定要删除身份 "${playerPersonas[index].name}" 吗？`)) {
            playerPersonas.splice(index, 1);
            localStorage.setItem('os_player_personas', JSON.stringify(playerPersonas));
            renderChatLists();
        }
    }

    // --- 创建 AI 角色 ---
    function renderCreateAIUI() {
        tempImages.temp_ai_img = "";
        document.getElementById('ai-avatar-preview').innerHTML = '<div class="upload-placeholder">🤖</div>';
        document.getElementById('ai-name').value = '';
        document.getElementById('ai-prompt').value = '';
        
        // 渲染世界书绑定项
        const wbList = document.getElementById('ai-wb-select-list'); wbList.innerHTML = worldBook.length > 0 ? '' : '<p style="color:#888; font-size:12px;">暂无世界书条目</p>';
        worldBook.forEach(wb => {
            wbList.innerHTML += `<div style="padding:5px;"><label><input type="checkbox" value="${wb.id}"> <span>${wb.title}</span></label></div>`;
        });

        // 渲染玩家身份绑定项
        const pSelect = document.getElementById('ai-bind-persona'); pSelect.innerHTML = '';
        playerPersonas.forEach(p => {
            pSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
        });

        navChat('view-create-ai');
    }

    function createAIRole() {
        const name = document.getElementById('ai-name').value.trim();
        if(!name) return alert("AI名字不能为空");
        
        const emoji = document.getElementById('ai-emoji').value;
        const prompt = document.getElementById('ai-prompt').value;
        const personaId = document.getElementById('ai-bind-persona').value;
        
        const checkboxes = document.querySelectorAll('#ai-wb-select-list input:checked');
        const boundWbIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

        aiRoles.push({ 
            id: Date.now(), name, avatar: emoji, image: tempImages.temp_ai_img, 
            prompt, boundWbIds, boundPersonaId: personaId, history: [] 
        });
        localStorage.setItem('os_ai_roles_v4', JSON.stringify(aiRoles));
        navChat('view-contacts');
    }

    // --- 聊天功能 ---
    function startChat(roleId) {
        currentRole = aiRoles.find(r => r.id === roleId);
        document.getElementById('chat-header-name').innerText = currentRole.name;
        const box = document.getElementById('chat-box'); box.innerHTML = '';
        
        if(currentRole.history && currentRole.history.length > 0) {
           currentRole.history.forEach(m => addBubble(m.content, m.role === 'user' ? 'right' : 'left'));
        } else {
            currentRole.history = []; // 初始化历史记录
            addBubble(`我是 ${currentRole.name}。`, 'left');
        }
        navChat('view-dialog');
    }

    function addBubble(text, side) {
        const div = document.createElement('div'); div.className = `msg-bubble msg-${side}`;
        
        let avatarHtml = "";
        if(side === 'left') { // AI 头像
            avatarHtml = currentRole.image ? `<img src="${currentRole.image}">` : `<div style="width:30px;height:30px;background:#eee;border-radius:15px;display:flex;justify-content:center;align-items:center;">${currentRole.avatar}</div>`;
        } else { // 对应的玩家身份头像
            const player = playerPersonas.find(p => p.id == currentRole.boundPersonaId) || playerPersonas[0];
            avatarHtml = player && player.image ? `<img src="${player.image}">` : `<div style="width:30px;height:30px;background:#ddd;border-radius:15px;display:flex;justify-content:center;align-items:center;">👤</div>`;
        }
        
        const bubbleContent = `<div class="bubble-content"></div>`;
        if(side === 'right') div.innerHTML = `${bubbleContent} ${avatarHtml}`;
        else div.innerHTML = `${avatarHtml} ${bubbleContent}`;
        
        const box = document.getElementById('chat-box');
        box.appendChild(div); 
        
        // 使用 textContent 防止 XSS
        const contentElem = div.querySelector('.bubble-content');
        contentElem.textContent = text;
        
        box.scrollTop = box.scrollHeight;
        return contentElem; 
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input'); const text = input.value.trim();
        if(!text) return;

        addBubble(text, 'right');
        currentRole.history.push({role: 'user', content: text});
        input.value = '';

        const loadingElem = addBubble('...', 'left');

        // 构建超级 Prompt
        let finalSystemPrompt = currentRole.prompt || "你是AI助手。";
        
        // 1. 注入世界书
        if(currentRole.boundWbIds && currentRole.boundWbIds.length > 0) {
            const boundEntries = worldBook.filter(wb => currentRole.boundWbIds.includes(wb.id));
            if(boundEntries.length > 0) finalSystemPrompt += "\n\n【已知设定】:\n" + boundEntries.map(e => `[${e.title}]: ${e.content}`).join("\n");
        }
        // 2. 注入对应玩家身份
        const player = playerPersonas.find(p => p.id == currentRole.boundPersonaId);
        if(player) {
            finalSystemPrompt += `\n\n【对话者信息(你的聊天对象)】\n名字: ${player.name}\n简介: ${player.desc}\n请注意你的聊天对象是谁。`;
        }

        const messages = [{role: "system", content: finalSystemPrompt}, ...currentRole.history.slice(-15)]; 

        try {
            const reply = await fetchOpenAI(messages);
            loadingElem.textContent = reply; // 使用 textContent
            currentRole.history.push({role: 'assistant', content: reply});
            localStorage.setItem('os_ai_roles_v4', JSON.stringify(aiRoles));
        } catch(e) {
            const errorMsg = "请求失败: " + e.message;
            loadingElem.textContent = errorMsg;
            loadingElem.style.color = 'red';
        }
    }

    async function fetchOpenAI(msgs) {
        if(!config.key) throw new Error("请先在设置中配置 API Key。");
        if(!config.url) throw new Error("请先在设置中配置接口地址。");
        
        const res = await fetch(config.url, {
            method: 'POST', 
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
            body: JSON.stringify({ model: config.model, messages: msgs })
        });

        if (!res.ok) {
            const errorData = await res.json().catch(() => ({ error: { message: '无法解析的错误响应' } }));
            throw new Error(errorData.error?.message || `HTTP Error ${res.status}`);
        }

        const data = await res.json();
        if (!data.choices || data.choices.length === 0) {
            throw new Error("API返回的数据中没有 choices。");
        }
        return data.choices[0].message.content;
    }
    
    document.getElementById('chat-input').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });

    // --- 美化与世界书其他逻辑补充 ---
    function handleBgUpload(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader(); reader.readAsDataURL(input.files[0]);
            reader.onload = e => document.body.style.backgroundImage = `url('${e.target.result}')`;
        }
    }
    function applyThemeUrl() { const url = document.getElementById('theme-bg').value; if(url) document.body.style.backgroundImage = `url('${url}')`; }
    function resetTheme() { document.body.style.backgroundImage = ''; }
    function wbRender() {
        const list = document.getElementById('wb-list'); list.innerHTML = '';
        worldBook.forEach((item, i) => {
            list.innerHTML += `<div class="card"><h3>${item.title}</h3><p style="font-size:13px;color:#666;max-height:40px;overflow:hidden;">${item.content}</p><div style="text-align:right;"><span style="color:red;font-size:12px;cursor:pointer;" onclick="worldBook.splice(${i},1);localStorage.setItem('os_worldbook',JSON.stringify(worldBook));wbRender();">删除</span></div></div>`;
        });
    }
    function wbAddNew() { document.getElementById('wb-editor').style.display = 'block'; }
    function wbCancel() { document.getElementById('wb-editor').style.display = 'none'; }
    function wbSave() {
        const title = document.getElementById('wb-title-input').value; const content = document.getElementById('wb-content-input').value;
        if(title && content) {
            worldBook.push({ id: Date.now(), title, content }); localStorage.setItem('os_worldbook', JSON.stringify(worldBook));
            document.getElementById('wb-title-input').value = ''; document.getElementById('wb-content-input').value = '';
            wbCancel(); wbRender();
        }
    }

</script>
